<main>
  <form nz-form [formGroup]="loginForm" class="login-form" (ngSubmit)="login()">
    <nz-form-item>
      <nz-form-control nzErrorTip="Please input your username!">
        <nz-input-wrapper>
          <nz-icon nzInputPrefix nzType="user" />
          <input type="text" nz-input formControlName="username" placeholder="Username" />
        </nz-input-wrapper>
      </nz-form-control>
    </nz-form-item>
    <nz-form-item>
      <nz-form-control nzErrorTip="Please input your Password!">
        <nz-input-password>
          <nz-icon nzInputPrefix nzType="lock" />
          <input nz-input formControlName="password" placeholder="Password" />
        </nz-input-password>
      </nz-form-control>
    </nz-form-item>
    <button nz-button class="login-form-button login-form-margin" nzType="primary">Log in</button>
  </form>
</main>
